name: Laravel Deploy to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted # Menggunakan runner yang jalan di VM kamu

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
          logout: true

      - name: Build Docker Image
        run: |
          # Menggunakan tag 'latest' agar mudah dipanggil saat deploy
          docker build -t ${{ secrets.DOCKER_USER }}/tailadmin-laravel:latest .

      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USER }}/tailadmin-laravel:latest

      - name: Cleanup Build Images
        if: always()
        run: |
          # Membersihkan sisa build agar disk VM tidak penuh
          docker image prune -f
